{% extends "base.html" %}
{% block title %}Planes de Suscripción — PRISLAB{% endblock %}
{% block content %}
<div class="container py-5">
  <h2 class="fw-bold mb-4"><i class="bi bi-stars me-2 text-warning"></i>Planes PRISLAB</h2>
  <div class="row g-4">
    {% for plan in planes %}
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body text-center p-4">
          <h4 class="fw-bold">{{ plan.nombre }}</h4>
          <p class="text-muted">{{ plan.descripcion }}</p>
          <h2 class="text-primary fw-bold">${{ plan.precio_mensual }}<small class="fs-6 text-muted">/mes</small></h2>
        </div>
      </div>
    </div>
    {% empty %}
    <div class="col-12 text-center py-5 text-muted"><p>No hay planes disponibles.</p></div>
    {% endfor %}
  </div>
</div>
{% endblock %}

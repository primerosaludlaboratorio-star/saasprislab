{% extends 'base.html' %}
{% load static %}

{% block title %}Nueva Transferencia{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">Nueva Transferencia de Inventario</h2>
    
    <div class="card">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Sucursal Origen</label>
                        <select name="sucursal_origen" class="form-select" required>
                            <option value="">Seleccionar...</option>
                            {% for suc in sucursales %}
                                <option value="{{ suc.id }}">{{ suc.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Sucursal Destino</label>
                        <select name="sucursal_destino" class="form-select" required>
                            <option value="">Seleccionar...</option>
                            {% for suc in sucursales %}
                                <option value="{{ suc.id }}">{{ suc.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Motivo</label>
                    <textarea name="motivo" class="form-control" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Crear Transferencia
                </button>
                <a href="{% url 'logistica:lista_transferencias' %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

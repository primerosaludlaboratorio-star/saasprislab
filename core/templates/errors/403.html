<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso denegado — PRISLAB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 520px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 0 40px rgba(245,158,11,0.4);
        }

        .brand-name {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 2rem;
            display: block;
        }

        .error-code {
            font-size: clamp(5rem, 20vw, 9rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.75rem; }

        p { font-size: 0.95rem; color: #94a3b8; line-height: 1.7; margin-bottom: 2rem; }

        .divider {
            width: 60px; height: 3px;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            border-radius: 2px; margin: 1.5rem auto;
        }

        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.75rem; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; text-decoration: none;
            transition: all 0.2s ease; background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff; box-shadow: 0 4px 15px rgba(59,130,246,0.4);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-icon">🔒</div>
        <span class="brand-name">PRISLAB v5</span>

        <div class="error-code">403</div>
        <h1>Acceso denegado</h1>
        <div class="divider"></div>
        <p>
            No tienes permiso para acceder a esta sección.<br>
            Si crees que es un error, contacta al administrador.
        </p>
        <a href="/home/" class="btn">⬅ Regresar al Dashboard</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — PRISLAB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 560px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 0 40px rgba(59,130,246,0.4);
        }

        .brand-name {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .error-code {
            font-size: clamp(5rem, 20vw, 9rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            box-shadow: 0 4px 15px rgba(59,130,246,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59,130,246,0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.12);
            color: #f1f5f9;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            border-radius: 2px;
            margin: 1.5rem auto;
        }

        .dots {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        .dot {
            position: absolute;
            border-radius: 50%;
            background: rgba(59,130,246,0.08);
        }
        .dot-1 { width: 400px; height: 400px; top: -100px; right: -100px; }
        .dot-2 { width: 300px; height: 300px; bottom: -80px; left: -80px; }
        .dot-3 { width: 200px; height: 200px; top: 50%; left: 5%; }
    </style>
</head>
<body>
    <div class="dots">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
    </div>

    <div class="container">
        <div class="logo-area">
            <div class="logo-icon">🧬</div>
            <div class="brand-name">PRISLAB v5</div>
        </div>

        <div class="error-code">404</div>
        <h1>Página no encontrada</h1>
        <div class="divider"></div>
        <p>
            La sección que buscas no existe o fue movida.<br>
            Puede que el enlace esté desactualizado o escribiste la URL incorrectamente.
        </p>

        <div class="btn-group">
            <a href="/home/" class="btn btn-primary">
                ⬅ Regresar al Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                Página anterior
            </a>
        </div>
    </div>
</body>
</html>

{% extends 'base.html' %}
{% block title %}Subir Documento de Capacitación — PRISLAB{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:640px">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="fw-bold mb-0"><i class="fas fa-upload text-primary me-2"></i>Subir Documento</h3>
    <a href="{% url 'dashboard_capacitacion' %}" class="btn btn-outline-secondary btn-sm">← Volver</a>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Título del documento *</label>
          <input type="text" name="titulo" class="form-control" placeholder="Ej: Manual de Laboratorio Clínico v3.0" required>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Tipo *</label>
            <select name="tipo" class="form-select" required>
              <option value="MANUAL">Manual operativo</option>
              <option value="POLITICA">Política interna</option>
              <option value="PROCESO">Procedimiento</option>
              <option value="NORMATIVA">Normativa / NOM</option>
              <option value="OTRO">Otro</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Versión</label>
            <input type="text" name="version" class="form-control" value="1.0" placeholder="1.0">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Descripción / resumen</label>
          <textarea name="descripcion" rows="3" class="form-control" placeholder="Breve descripción del contenido..."></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Archivo * <span class="text-muted">(PDF, DOCX)</span></label>
          <input type="file" name="archivo" class="form-control" accept=".pdf,.docx,.doc,.txt" required>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <a href="{% url 'dashboard_capacitacion' %}" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-upload me-1"></i>Subir documento
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

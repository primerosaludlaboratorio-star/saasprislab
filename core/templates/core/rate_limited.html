<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Limitado - PRISLAB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
        }
        .container {
            text-align: center; padding: 3rem; background: rgba(255,255,255,0.05);
            border-radius: 20px; backdrop-filter: blur(10px); max-width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #ff6b6b; }
        p { font-size: 1rem; margin-bottom: 1.5rem; opacity: 0.8; line-height: 1.6; }
        .timer {
            font-size: 2.5rem; font-weight: bold; color: #ffd93d;
            margin: 1rem 0; font-variant-numeric: tabular-nums;
        }
        .btn {
            display: inline-block; padding: 12px 32px; background: #D9230F;
            color: white; text-decoration: none; border-radius: 8px;
            font-weight: 600; transition: opacity .2s; margin-top: 1rem;
        }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128274;</div>
        <h1>Acceso Temporalmente Limitado</h1>
        <p>{{ mensaje|default:"Has excedido el numero de intentos permitidos. Por seguridad, espera unos minutos antes de intentar nuevamente." }}</p>
        <div class="timer" id="countdown">--:--</div>
        <p style="font-size: 0.85rem;">Si crees que es un error, contacta al administrador.</p>
        <a href="/" class="btn">Volver al Inicio</a>
    </div>
    <script>
        let seconds = {{ wait_seconds|default:300 }};
        const el = document.getElementById('countdown');
        function tick() {
            if (seconds <= 0) { location.reload(); return; }
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            seconds--;
            setTimeout(tick, 1000);
        }
        tick();
    </script>
</body>
</html>

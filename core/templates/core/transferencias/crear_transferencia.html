{% extends "base.html" %}
{% load static %}

{% block title %}Nueva Transferencia{% endblock %}

{% block content %}
<div class="container-fluid mt-4" style="max-width:800px;">
    <div class="d-flex align-items-center mb-4">
        <a href="{% url 'lista_transferencias' %}" class="btn btn-outline-secondary me-3">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="mb-0"><i class="fas fa-exchange-alt text-primary"></i> Nueva Transferencia</h2>
            <p class="text-muted mb-0">Mover inventario entre sucursales</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Sucursal Origen *</label>
                        <select name="sucursal_origen" class="form-select" required>
                            <option value="">— Seleccionar —</option>
                            {% for s in sucursales %}
                            <option value="{{ s.id }}">{{ s.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Sucursal Destino *</label>
                        <select name="sucursal_destino" class="form-select" required>
                            <option value="">— Seleccionar —</option>
                            {% for s in sucursales %}
                            <option value="{{ s.id }}">{{ s.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Motivo / Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="2" placeholder="Razón de la transferencia..."></textarea>
                </div>

                <h6 class="fw-bold text-primary mb-3"><i class="fas fa-boxes"></i> Productos a transferir</h6>

                <div id="productos-container">
                    <div class="row g-2 mb-2 producto-row align-items-end">
                        <div class="col-md-5">
                            <label class="form-label small">Buscar producto</label>
                            <input type="text" class="form-control form-control-sm producto-search" placeholder="Nombre o código...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small">Cantidad</label>
                            <input type="number" name="cantidades[]" class="form-control form-control-sm" min="1" value="1" required>
                        </div>
                        <div class="col-md-1">
                            <button type="button" class="btn btn-sm btn-outline-danger remove-row" title="Eliminar">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <input type="hidden" name="productos[]" class="producto-id">
                    </div>
                </div>

                <button type="button" id="agregar-producto" class="btn btn-sm btn-outline-secondary mb-4">
                    <i class="fas fa-plus"></i> Agregar producto
                </button>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'lista_transferencias' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Crear Transferencia
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('agregar-producto').addEventListener('click', function(){
    const container = document.getElementById('productos-container');
    const first = container.querySelector('.producto-row');
    const clone = first.cloneNode(true);
    clone.querySelector('.producto-search').value = '';
    clone.querySelector('input[name="cantidades[]"]').value = 1;
    clone.querySelector('.producto-id').value = '';
    container.appendChild(clone);
});
document.addEventListener('click', function(e){
    if(e.target.closest('.remove-row')){
        const rows = document.querySelectorAll('.producto-row');
        if(rows.length > 1) e.target.closest('.producto-row').remove();
    }
});
</script>
{% endblock %}

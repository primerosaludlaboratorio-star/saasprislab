<!-- Modal de Cobro/Abono -->
<div class="modal fade" id="modalCobro" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-warning border-3">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-cash-coin"></i> ABONAR/COBRAR ORDEN
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-primary d-flex justify-content-between align-items-center">
                    <span class="h5 mb-0">Total Orden:</span>
                    <span class="h4 mb-0 font-weight-bold" id="cobro_total_display">$0.00</span>
                </div>
                
                <!-- 1. EFECTIVO (Recibido) - Campo Principal, desbloqueado -->
                <div class="form-group mb-3">
                    <label class="fw-bold">1. EFECTIVO (Recibido):</label>
                    <input type="number" class="form-control form-control-lg fw-bold text-center border-success" 
                           id="pago_efectivo" step="0.01" min="0" autocomplete="off"
                           oninput="calcularBalanceMultimodalLab()"
                           onfocus="this.select()"
                           onkeydown="if(event.key==='Enter') { event.preventDefault(); document.getElementById('pago_tarjeta').focus(); }"
                           value="0.00">
                </div>
                
                <!-- 2. TARJETA -->
                <div class="form-group mb-3">
                    <label class="fw-bold">2. TARJETA:</label>
                    <input type="number" class="form-control form-control-lg fw-bold text-center border-primary" 
                           id="pago_tarjeta" step="0.01" min="0" autocomplete="off"
                           oninput="calcularBalanceMultimodalLab()"
                           onfocus="this.select()"
                           onkeydown="if(event.key==='Enter') { event.preventDefault(); document.getElementById('pago_transferencia').focus(); }"
                           value="0.00">
                </div>
                
                <!-- 3. TRANSFERENCIA -->
                <div class="form-group mb-3">
                    <label class="fw-bold">3. TRANSFERENCIA:</label>
                    <input type="number" class="form-control form-control-lg fw-bold text-center border-info" 
                           id="pago_transferencia" step="0.01" min="0" autocomplete="off"
                           oninput="calcularBalanceMultimodalLab()"
                           onfocus="this.select()"
                           onkeydown="if(event.key==='Enter') { event.preventDefault(); document.getElementById('btn-registrar-pago').focus(); }"
                           value="0.00">
                    <small class="text-muted mt-1 d-block">Referencia (opcional):</small>
                    <input type="text" class="form-control form-control-sm mt-1" id="referencia_pago" 
                           placeholder="4 últimos dígitos o Folio de transferencia"
                           onfocus="this.select()">
                </div>

                <!-- FEEDBACK EN TIEMPO REAL -->
                <div class="card bg-light mb-3">
                    <div class="card-body text-center py-2">
                        <span id="label_feedback_lab" class="text-muted d-block mb-1">Estado del Pago:</span>
                        <h3 id="monto_feedback_lab" class="font-weight-bold mb-0">$0.00</h3>
                    </div>
                </div>
                
                <input type="hidden" id="modalCobroOrdenId">
                <input type="hidden" id="modalCobroSaldoTotal">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success fw-bold" id="btn-registrar-pago" onclick="procesarCobro()">
                    <i class="bi bi-check-circle"></i> Registrar Pago
                </button>
            </div>
        </div>
    </div>
</div>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modo contingencia — PRISLAB</title>
  <style>
    :root { --amber: #b45309; --azul: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, var(--azul) 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #f8fafc;
    }
    .card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      max-width: 520px; width: 92%;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: var(--amber);
      color: #fff;
      border-radius: 999px;
      padding: .35rem 1rem;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: .75rem; }
    p { font-size: .95rem; opacity: .85; line-height: 1.65; }
    .code { margin-top: 1.5rem; font-size: .8rem; opacity: .55; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Solo lectura</div>
    <h1>Modo de contingencia</h1>
    <p>{{ mensaje|default:"PRISLAB está en Modo de Contingencia (Solo Lectura)." }}</p>
    <p style="margin-top:1rem;">Puede consultar historiales y pantallas con navegación normal. Las acciones que guardan o modifican datos están desactivadas hasta nuevo aviso.</p>
    <p class="code">HTTP 405 — PRISLAB_READ_ONLY</p>
  </div>
</body>
</html>

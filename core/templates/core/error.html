{% extends "base.html" %}
{% block title %}Error - PRISLAB{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg" style="border-radius: 16px; overflow: hidden;">
                <div class="card-header text-center text-white py-4" style="background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);">
                    <i class="bi bi-exclamation-triangle-fill" style="font-size: 3rem;"></i>
                    <h4 class="mt-2 mb-0 fw-bold">{{ titulo|default:"Error" }}</h4>
                </div>
                <div class="card-body text-center p-4">
                    <p class="text-muted fs-5 mb-4">{{ mensaje|default:"Ha ocurrido un error inesperado." }}</p>
                    {% if detalle %}
                    <div class="alert alert-light border small text-start">{{ detalle }}</div>
                    {% endif %}
                    <a href="javascript:history.back()" class="btn btn-outline-secondary me-2">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                    <a href="/" class="btn btn-primary">
                        <i class="bi bi-house"></i> Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

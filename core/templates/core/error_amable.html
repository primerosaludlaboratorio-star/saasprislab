<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISLAB - Optimizando el sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .error-card {
            max-width: 520px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .error-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            padding: 32px 24px;
            text-align: center;
            color: white;
        }
        .error-header i {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .error-body {
            padding: 32px 24px;
            text-align: center;
        }
        .countdown {
            font-size: 2rem;
            font-weight: 700;
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="error-card card">
        <div class="error-header">
            <i class="bi bi-gear-wide-connected"></i>
            <h4 class="fw-bold mb-1">Estamos optimizando el sistema</h4>
            <p class="mb-0 opacity-75" style="font-size: 0.9rem;">Su accion ha sido registrada correctamente</p>
        </div>
        <div class="error-body">
            <p class="text-muted mb-3">
                Nuestro equipo tecnico ha sido notificado automaticamente.
                El sistema se restablecera en breve.
            </p>
            <p class="text-muted small mb-4">
                <i class="bi bi-shield-check text-success"></i>
                Incidencia registrada en PRIS Sentinel
            </p>
            <div class="mb-4">
                <span class="text-muted">Redirigiendo en </span>
                <span class="countdown" id="countdown">5</span>
                <span class="text-muted"> segundos</span>
            </div>
            <div class="d-flex gap-2 justify-content-center">
                <a href="javascript:history.back()" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Regresar
                </a>
                <a href="/" class="btn btn-primary">
                    <i class="bi bi-house"></i> Ir al Inicio
                </a>
            </div>
        </div>
    </div>

    <script>
        let seconds = 8;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            el.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                // Reintentar la misma pagina en vez de ir a otra parte
                window.location.reload();
            }
        }, 1000);
    </script>
</body>
</html>

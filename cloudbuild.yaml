# ==============================================================================
# PRISLAB V5.2 "EMPORIO" — Cloud Build + Cloud Run Deployment
# ==============================================================================
# FLUJO ATÓMICO (todo o nada):
#
#   PASO 1  build-image          — Construir imagen Docker
#   PASO 2a push-image-latest    — Push :latest       ─┐ paralelo
#   PASO 2b push-image-build     — Push :<BUILD_ID>   ─┘
#   PASO 3  omni-suite-gate      — Suite completa contra CLOUD antes del deploy
#                                  Si ok:false → ABORT. Ningún servicio se toca.
#   PASO 4  deploy-prislab-saas  — Deploy prislab-saas (migrate + tráfico)
#   PASO 4b deploy-prislab-v5    — Tras SaaS (mismo env/secrets/Cloud SQL que SaaS)
#   PASO 4c deploy-prislab-farm  — Tras v5 (evita migrate concurrente en Postgres)
#   PASO 5  setup-scheduler      — Cloud Scheduler (metrología + stock)
#   PASO 6  smoke-test           — Verificación HTTP final de los 3 servicios
#
# Uso:  gcloud builds submit --config cloudbuild.yaml .
# Secretos requeridos en Secret Manager:
#   django-secret-key, db-password, gemini-api-key, drive-folder-id,
#   vapid-private-key, vapid-public-key, github-token, fernet-key,
#   telegram-bot-token, telegram-ciso-chat-id,
#   lab-validation-pin (PIN laboratorio ≥8 caracteres; NO usar variable plana en prod),
#   e2e-user (usuario admin para suite), e2e-pass (contraseña admin para suite)
#
# Variables planas añadidas en deploy (§9 SOP): GCS_BACKUP_BUCKET=prislab-drp-backups,
# HL7_ACTIVE=False, ADMIN_* en False, FACTURAMA_SANDBOX=True (timbrado prueba hasta PAC prod).
# ==============================================================================

steps:

  # ── PASO 1: Construir imagen Docker ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/prislab-v5:latest'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}'
      - '.'
    id: 'build-image'

  # ── PASO 2: Push de la imagen al Container Registry (paralelo) ─────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/prislab-v5:latest']
    id: 'push-image-latest'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}']
    id: 'push-image-build'
    waitFor: ['build-image']

  # ── PASO 3: GATE — Suite Omni contra Cloud (target=cloud) ──────────────────
  # La suite apunta al servicio ACTUAL en producción (antes de reemplazarlo).
  # Si ok:false el step falla (exit 1) y Cloud Build aborta sin tocar nada.
  # Las credenciales vienen de Secret Manager (e2e-user / e2e-pass).
  - name: 'node:20-slim'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -eo pipefail
        echo ">>> Instalando dependencias de la suite..."
        if [ -f package-lock.json ]; then
          npm ci --omit=dev 2>&1 | tail -20
        else
          npm install --omit=dev 2>&1 | tail -20
        fi

        echo ">>> Instalando Playwright Chromium..."
        npx playwright install chromium --with-deps 2>&1 | tail -10

        echo ">>> Ejecutando suite omni:cloud..."
        export OMNI_PRELOGIN=1
        export OMNI_BETWEEN_AUDIT_DELAY_MS=5000
        export OMNI_TIMEOUT_MS=240000
        node tools/run_omni_suite.mjs \
          --target cloud \
          --base "https://prislab-saas-811785477499.us-central1.run.app" \
          --retries 2 \
          --user "$$E2E_USER" \
          --pass "$$E2E_PASS"

        SUMMARY="tools/last_suite_summary.json"
        if [ ! -f "$$SUMMARY" ]; then
          echo "[GATE] ERROR: no se generó last_suite_summary.json"
          exit 1
        fi

        SUITE_OK=$$(node -e "const s=require('./tools/last_suite_summary.json'); const ok = (s.ok ?? s.summary?.ok); process.stdout.write(ok ? 'true' : 'false');" 2>/dev/null || echo "false")
        if [ "$$SUITE_OK" != "true" ]; then
          echo ""
          echo "======================================================"
          echo "  ❌ GATE FALLIDO — suite ok:false. Deploy ABORTADO."
          echo "  Revisa tools/last_suite_summary.json para detalles."
          echo "======================================================"
          cat tools/last_suite_summary.json
          exit 1
        fi

        echo ""
        echo "[GATE] ✅ Suite ok:true ✅ procediendo al deploy."
    secretEnv: ['E2E_USER', 'E2E_PASS', 'OMNI_BYPASS_TOKEN']
    id: 'omni-suite-gate'
    waitFor: ['push-image-latest', 'push-image-build']

  # ── PASO 4: Deploy prislab-saas (servicio principal) ───────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prislab-saas'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--cpu-boost'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--add-cloudsql-instances'
      - 'prislab-v5-ai:us-central1:prislab-db'
      # OBLIGATORIO incluir aquí todas las vars “planas”: gcloud --set-env-vars reemplaza
      # el conjunto completo en cada deploy; si faltan, se pierden las añadidas solo en consola.
      - '--set-env-vars'
      - >-
        DEBUG=False,
        GOOGLE_CLOUD_PROJECT=prislab-v5-ai,
        CLOUD_SQL_CONNECTION_NAME=prislab-v5-ai:us-central1:prislab-db,
        DB_NAME=prislab_v5,
        DB_USER=prislab_user,
        GS_BUCKET_NAME=prislab-v5-media,
        GUNICORN_WORKERS=2,
        GUNICORN_THREADS=4,
        GITHUB_REPO=primerosaludlaboratorio-star/PRISLAB_SaaS,
        PRISLAB_SKIP_HEAVY_STARTUP=true,
        PRISLAB_ESCUDO_USUARIO_ID=1,
        GCS_BACKUP_BUCKET=prislab-drp-backups,
        HL7_ACTIVE=False,
        ADMIN_IP_RESTRICTION_ENABLED=False,
        ADMIN_GROUP_RESTRICTION_ENABLED=False,
        FACTURAMA_SANDBOX=True,
        API_URL=https://prislab-saas-811785477499.us-central1.run.app,
        PRISLAB_SAAS_URL=https://prislab-saas-811785477499.us-central1.run.app,
        PRISLAB_DEFAULT_EMPRESA_ID=1,
        CORS_ALLOW_ALL_ORIGINS=True
      - '--update-secrets'
      - >-
        SECRET_KEY=django-secret-key:latest,
        DB_PASSWORD=db-password:latest,
        GEMINI_API_KEY=gemini-api-key:latest,
        GOOGLE_API_KEY=gemini-api-key:latest,
        DRIVE_FOLDER_ID=drive-folder-id:latest,
        VAPID_PRIVATE_KEY=vapid-private-key:latest,
        VAPID_PUBLIC_KEY=vapid-public-key:latest,
        GITHUB_TOKEN=github-token:latest,
        FERNET_KEY=fernet-key:latest,
        TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,
        TELEGRAM_CISO_CHAT_ID=telegram-ciso-chat-id:latest,
        OMNI_BYPASS_TOKEN=omni-bypass-token:latest,
        PRISLAB_INIT_ADMIN_PASSWORD=e2e-pass:latest,
        LAB_VALIDATION_PIN=lab-validation-pin:latest
    id: 'deploy-prislab-saas'
    waitFor: ['omni-suite-gate']

  # ── PASO 4b: Deploy prislab-v5 (misma imagen y MISMO entorno que prislab-saas) ─
  # Sin DB/secrets/FERNET/PIN/escudo, Django en nube hace RuntimeError y el deploy falla.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prislab-v5'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--cpu-boost'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--add-cloudsql-instances'
      - 'prislab-v5-ai:us-central1:prislab-db'
      - '--set-env-vars'
      - >-
        DEBUG=False,
        GOOGLE_CLOUD_PROJECT=prislab-v5-ai,
        CLOUD_SQL_CONNECTION_NAME=prislab-v5-ai:us-central1:prislab-db,
        DB_NAME=prislab_v5,
        DB_USER=prislab_user,
        GS_BUCKET_NAME=prislab-v5-media,
        GUNICORN_WORKERS=2,
        GUNICORN_THREADS=4,
        GITHUB_REPO=primerosaludlaboratorio-star/PRISLAB_SaaS,
        PRISLAB_SKIP_HEAVY_STARTUP=true,
        PRISLAB_ESCUDO_USUARIO_ID=1,
        GCS_BACKUP_BUCKET=prislab-drp-backups,
        HL7_ACTIVE=False,
        ADMIN_IP_RESTRICTION_ENABLED=False,
        ADMIN_GROUP_RESTRICTION_ENABLED=False,
        FACTURAMA_SANDBOX=True,
        API_URL=https://prislab-saas-811785477499.us-central1.run.app,
        PRISLAB_SAAS_URL=https://prislab-saas-811785477499.us-central1.run.app,
        PRISLAB_DEFAULT_EMPRESA_ID=1,
        CORS_ALLOW_ALL_ORIGINS=True
      - '--update-secrets'
      - >-
        SECRET_KEY=django-secret-key:latest,
        DB_PASSWORD=db-password:latest,
        GEMINI_API_KEY=gemini-api-key:latest,
        GOOGLE_API_KEY=gemini-api-key:latest,
        DRIVE_FOLDER_ID=drive-folder-id:latest,
        VAPID_PRIVATE_KEY=vapid-private-key:latest,
        VAPID_PUBLIC_KEY=vapid-public-key:latest,
        GITHUB_TOKEN=github-token:latest,
        FERNET_KEY=fernet-key:latest,
        TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,
        TELEGRAM_CISO_CHAT_ID=telegram-ciso-chat-id:latest,
        OMNI_BYPASS_TOKEN=omni-bypass-token:latest,
        PRISLAB_INIT_ADMIN_PASSWORD=e2e-pass:latest,
        LAB_VALIDATION_PIN=lab-validation-pin:latest
    id: 'deploy-prislab-v5'
    # Tras SaaS: evita dos migrate concurrentes contra la misma Postgres al arrancar revisión.
    waitFor: ['deploy-prislab-saas']

  # ── PASO 4c: Deploy prislab-farmacia (misma imagen y MISMO entorno que SaaS) ─
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prislab-farmacia'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--cpu-boost'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--add-cloudsql-instances'
      - 'prislab-v5-ai:us-central1:prislab-db'
      - '--set-env-vars'
      - >-
        DEBUG=False,
        GOOGLE_CLOUD_PROJECT=prislab-v5-ai,
        CLOUD_SQL_CONNECTION_NAME=prislab-v5-ai:us-central1:prislab-db,
        DB_NAME=prislab_v5,
        DB_USER=prislab_user,
        GS_BUCKET_NAME=prislab-v5-media,
        GUNICORN_WORKERS=2,
        GUNICORN_THREADS=4,
        GITHUB_REPO=primerosaludlaboratorio-star/PRISLAB_SaaS,
        PRISLAB_SKIP_HEAVY_STARTUP=true,
        PRISLAB_ESCUDO_USUARIO_ID=1,
        GCS_BACKUP_BUCKET=prislab-drp-backups,
        HL7_ACTIVE=False,
        ADMIN_IP_RESTRICTION_ENABLED=False,
        ADMIN_GROUP_RESTRICTION_ENABLED=False,
        FACTURAMA_SANDBOX=True,
        API_URL=https://prislab-saas-811785477499.us-central1.run.app,
        PRISLAB_SAAS_URL=https://prislab-saas-811785477499.us-central1.run.app,
        PRISLAB_DEFAULT_EMPRESA_ID=1,
        CORS_ALLOW_ALL_ORIGINS=True
      - '--update-secrets'
      - >-
        SECRET_KEY=django-secret-key:latest,
        DB_PASSWORD=db-password:latest,
        GEMINI_API_KEY=gemini-api-key:latest,
        GOOGLE_API_KEY=gemini-api-key:latest,
        DRIVE_FOLDER_ID=drive-folder-id:latest,
        VAPID_PRIVATE_KEY=vapid-private-key:latest,
        VAPID_PUBLIC_KEY=vapid-public-key:latest,
        GITHUB_TOKEN=github-token:latest,
        FERNET_KEY=fernet-key:latest,
        TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,
        TELEGRAM_CISO_CHAT_ID=telegram-ciso-chat-id:latest,
        OMNI_BYPASS_TOKEN=omni-bypass-token:latest,
        PRISLAB_INIT_ADMIN_PASSWORD=e2e-pass:latest,
        LAB_VALIDATION_PIN=lab-validation-pin:latest
    id: 'deploy-prislab-farmacia'
    waitFor: ['deploy-prislab-v5']

  # ── PASO 5: Cloud Scheduler (metrología 8AM + stock crítico 7AM CDMX) ──────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        SERVICE_URL=$(gcloud run services describe prislab-saas \
          --region us-central1 --format 'value(status.url)')
        echo "Configurando Cloud Scheduler para: $${SERVICE_URL}"

        gcloud scheduler jobs create http prislab-check-metrologia \
          --location us-central1 \
          --schedule "0 14 * * *" \
          --uri "$${SERVICE_URL}/cron/check-metrologia/" \
          --http-method POST \
          --oidc-service-account-email "prislab-v5-ai@prislab-v5-ai.iam.gserviceaccount.com" \
          --headers "X-CloudScheduler-JobName=prislab-check-metrologia,Content-Type=application/json" \
          --time-zone "America/Mexico_City" \
          --description "PRISLAB: Verifica certificados metrologicos vencidos/proximos. ISO 15189." \
          2>/dev/null || \
        gcloud scheduler jobs update http prislab-check-metrologia \
          --location us-central1 \
          --schedule "0 14 * * *" \
          --uri "$${SERVICE_URL}/cron/check-metrologia/" \
          --http-method POST \
          --oidc-service-account-email "prislab-v5-ai@prislab-v5-ai.iam.gserviceaccount.com" \
          --headers "X-CloudScheduler-JobName=prislab-check-metrologia,Content-Type=application/json" \
          --time-zone "America/Mexico_City" 2>/dev/null || true

        gcloud scheduler jobs create http prislab-check-stock-critico \
          --location us-central1 \
          --schedule "0 13 * * *" \
          --uri "$${SERVICE_URL}/cron/check-stock-critico/" \
          --http-method POST \
          --oidc-service-account-email "prislab-v5-ai@prislab-v5-ai.iam.gserviceaccount.com" \
          --headers "X-CloudScheduler-JobName=prislab-check-stock-critico,Content-Type=application/json" \
          --time-zone "America/Mexico_City" \
          --description "PRISLAB: Detecta silos con stock bajo minimo. Alerta al Director." \
          2>/dev/null || \
        gcloud scheduler jobs update http prislab-check-stock-critico \
          --location us-central1 \
          --schedule "0 13 * * *" \
          --uri "$${SERVICE_URL}/cron/check-stock-critico/" \
          --http-method POST \
          --oidc-service-account-email "prislab-v5-ai@prislab-v5-ai.iam.gserviceaccount.com" \
          --headers "X-CloudScheduler-JobName=prislab-check-stock-critico,Content-Type=application/json" \
          --time-zone "America/Mexico_City" 2>/dev/null || true

        gcloud scheduler jobs create http prislab-verify-escudo-clinico \
          --location us-central1 \
          --schedule "15 */6 * * *" \
          --uri "$${SERVICE_URL}/cron/verify-escudo-clinico/" \
          --http-method POST \
          --oidc-service-account-email "prislab-v5-ai@prislab-v5-ai.iam.gserviceaccount.com" \
          --headers "X-CloudScheduler-JobName=prislab-verify-escudo-clinico,Content-Type=application/json" \
          --time-zone "America/Mexico_City" \
          --description "PRISLAB: Verifica PRISLAB_ESCUDO_USUARIO_ID activo (pánico LIMS)." \
          2>/dev/null || \
        gcloud scheduler jobs update http prislab-verify-escudo-clinico \
          --location us-central1 \
          --schedule "15 */6 * * *" \
          --uri "$${SERVICE_URL}/cron/verify-escudo-clinico/" \
          --http-method POST \
          --oidc-service-account-email "prislab-v5-ai@prislab-v5-ai.iam.gserviceaccount.com" \
          --headers "X-CloudScheduler-JobName=prislab-verify-escudo-clinico,Content-Type=application/json" \
          --time-zone "America/Mexico_City" 2>/dev/null || true

        echo "[OK] Cloud Scheduler configurado"
    id: 'setup-scheduler'
    waitFor: ['deploy-prislab-saas', 'deploy-prislab-v5', 'deploy-prislab-farmacia']

  # ── PASO 6: Smoke Test final — verifica los 3 servicios en vuelo ───────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -eo pipefail
        SAAS_URL=$(gcloud run services describe prislab-saas      --region us-central1 --format 'value(status.url)')
        V5_URL=$(gcloud run services describe prislab-v5          --region us-central1 --format 'value(status.url)')
        FARM_URL=$(gcloud run services describe prislab-farmacia  --region us-central1 --format 'value(status.url)')

        check() {
          local label="$1" url="$2" expected="$3"
          local code
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$$url" || echo "000")
          if [ "$$code" = "$$expected" ] || [ "$$expected" = "any" ]; then
            echo "[OK] $$label: HTTP $$code"
          else
            echo "[WARN] $$label: HTTP $$code (esperado $$expected)"
          fi
        }

        check "prislab-saas     /login/"          "$${SAAS_URL}/login/"                    "200"
        check "prislab-v5       /login/"          "$${V5_URL}/login/"                      "200"
        check "prislab-farmacia /login/"          "$${FARM_URL}/login/"                    "200"
        check "prislab-saas     /farmacia/pdv/"   "$${SAAS_URL}/farmacia/pdv/"             "302"
        check "prislab-saas     War Room"         "$${SAAS_URL}/director/war-room/"        "302"
        check "prislab-saas     PRIS Asistente"   "$${SAAS_URL}/ia/asistente/"             "302"
        check "prislab-saas     API anomalías"    "$${SAAS_URL}/director/war-room/api/anomalias/" "302"

        echo ""
        echo "======================================================"
        echo "SISTEMA EN VUELO — PRISLAB v5.2 EMPORIO"
        echo "prislab-saas    : $${SAAS_URL}"
        echo "prislab-v5      : $${V5_URL}"
        echo "prislab-farmacia: $${FARM_URL}"
        echo "Build           : ${BUILD_ID}"
        echo "======================================================"
    id: 'smoke-test'
    waitFor: ['setup-scheduler']

# ── Imágenes guardadas en el Registry ────────────────────────────────────────
images:
  - 'gcr.io/${PROJECT_ID}/prislab-v5:latest'
  - 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}'

# ── Secretos (Secret Manager → variables de entorno en el step de la suite) ──
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/e2e-user/versions/latest
      env: 'E2E_USER'
    - versionName: projects/${PROJECT_ID}/secrets/e2e-pass/versions/latest
      env: 'E2E_PASS'
    - versionName: projects/${PROJECT_ID}/secrets/omni-bypass-token/versions/latest
      env: 'OMNI_BYPASS_TOKEN'

# ── Timeout total del build (40 minutos) ─────────────────────────────────────
timeout: '2400s'

# ── Opciones de la máquina de build ──────────────────────────────────────────
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

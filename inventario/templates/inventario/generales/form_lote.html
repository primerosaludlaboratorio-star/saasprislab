{% extends "base.html" %}
{% block title %}{{ titulo }} — PRISLAB{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-3" style="max-width:560px">
  <h5 class="fw-bold mb-3"><i class="bi bi-plus-circle me-2 text-success"></i>{{ titulo }}</h5>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold">Artículo *</label>
            <select name="insumo" class="form-select" required>
              <option value="">— Seleccionar —</option>
              {% for i in insumos %}
              <option value="{{ i.pk }}" {% if request.GET.insumo == i.pk|stringformat:'i' %}selected{% endif %}>
                {{ i.nombre }} ({{ i.get_categoria_display }})
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Cantidad Inicial *</label>
            <input type="number" step="0.01" min="0.01" name="cantidad_inicial" required class="form-control">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Precio Unitario de Compra</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" step="0.0001" name="precio_unitario_compra" value="0" class="form-control">
            </div>
          </div>
        </div>
        <div class="mt-3 d-flex gap-2">
          <button type="submit" class="btn btn-success">Registrar Entrada</button>
          <a href="{% url 'inventario:lista_lotes_generales' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

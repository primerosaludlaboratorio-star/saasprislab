{% extends "base.html" %}
{% block title %}{{ titulo }} — PRISLAB{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-3" style="max-width:600px">
  <h5 class="fw-bold mb-3"><i class="bi bi-arrow-down-circle me-2 text-danger"></i>{{ titulo }}</h5>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold">Lote a Consumir (FEFO automático) *</label>
            <select name="lote" class="form-select" required>
              <option value="">— Seleccionar lote —</option>
              {% for l in lotes %}
              <option value="{{ l.pk }}">
                {{ l.insumo.nombre }} — Lote {{ l.numero_lote|default:"S/L" }}
                | Disp: {{ l.cantidad_actual|floatformat:1 }}
                {% if l.fecha_caducidad %}| Cad: {{ l.fecha_caducidad|date:"d/m/Y" }}{% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Cantidad Consumida *</label>
            <input type="number" step="0.01" min="0.01" name="cantidad" required class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Motivo / Procedimiento *</label>
            <input type="text" name="motivo" required class="form-control" placeholder="Ej: Toma de signos vitales, curación de herida…">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">ID Cita (opcional)</label>
            <input type="number" name="cita_id" class="form-control" placeholder="Dejar vacío si no aplica">
          </div>
        </div>
        <div class="mt-3 d-flex gap-2">
          <button type="submit" class="btn btn-danger">Registrar Consumo</button>
          <a href="{% url 'inventario:lista_salidas_consultorio' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

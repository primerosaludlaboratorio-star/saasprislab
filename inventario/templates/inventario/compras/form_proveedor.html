{% extends "base.html" %}
{% block title %}{{ titulo }} — PRISLAB{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-3" style="max-width:700px">
  <h5 class="fw-bold mb-3"><i class="bi bi-building-add me-2"></i>{{ titulo }}</h5>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="row g-3">
          <div class="col-sm-8">
            <label class="form-label fw-semibold">Razón Social *</label>
            <input type="text" name="razon_social" required class="form-control" placeholder="Ej: Distribuidora Médica S.A. de C.V.">
          </div>
          <div class="col-sm-4">
            <label class="form-label fw-semibold">RFC</label>
            <input type="text" name="rfc" class="form-control" placeholder="XXXX000000XXX">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Nombre del Contacto</label>
            <input type="text" name="contacto_nombre" class="form-control">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="text" name="contacto_telefono" class="form-control">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Correo Electrónico</label>
            <input type="email" name="contacto_email" class="form-control">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Condiciones de Pago</label>
            <input type="text" name="condiciones_pago" class="form-control" placeholder="Ej: 30 días neto, contado…">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Notas</label>
            <textarea name="notas" rows="2" class="form-control"></textarea>
          </div>
        </div>
        <div class="mt-3 d-flex gap-2">
          <button type="submit" class="btn btn-primary">Guardar Proveedor</button>
          <a href="{% url 'inventario:lista_proveedores' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

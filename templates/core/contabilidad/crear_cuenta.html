<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Cuenta Contable</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f7fa; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; }
    h1 { color: #1F4E79; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 16px; background: #1F4E79; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .btn { display: inline-block; margin-top: 16px; padding: 8px 12px; background: #999; color: #fff; text-decoration: none; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Crear Cuenta Contable</h1>
    <form method="post">
      {% csrf_token %}
      <label for="codigo">Código</label>
      <input type="text" id="codigo" name="codigo" required>
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required>
      <label for="tipo">Tipo</label>
      <select id="tipo" name="tipo" required>
        {% for val, label in tipos %}
        <option value="{{ val }}">{{ label }}</option>
        {% endfor %}
      </select>
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" name="descripcion" rows="3"></textarea>
      <button type="submit">Guardar</button>
      <a class="btn" href="{% url 'contabilidad:catalogo_cuentas' %}">Cancelar</a>
    </form>
  </div>
</body>
</html>

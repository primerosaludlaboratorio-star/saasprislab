# ==============================================================================
# PRISLAB — Deploy Rápido: SOLO módulo Farmacia (prislab-saas)
# ==============================================================================
# Uso:
#   gcloud builds submit --config cloudbuild_farmacia_only.yaml .
#
# Qué hace:
#   1. Construye la imagen Docker con los cambios de Farmacia
#   2. Push de la imagen (latest + BUILD_ID)
#   3. Deploy ÚNICAMENTE de prislab-saas (el servicio principal)
#   4. Smoke-test básico de farmacia (/farmacia/pdv/ → 200)
#
# Qué NO hace:
#   ✗ NO corre el omni-suite-gate completo (no bloquea otros módulos)
#   ✗ NO despliega prislab-v5 ni prislab-farmacia
#   ✗ NO reconfigura Cloud Scheduler
#
# Secretos requeridos (mismos que cloudbuild.yaml principal):
#   django-secret-key, db-password, gemini-api-key, drive-folder-id,
#   vapid-private-key, vapid-public-key, github-token, fernet-key,
#   telegram-bot-token, telegram-ciso-chat-id, omni-bypass-token, e2e-pass
# ==============================================================================

steps:

  # ── PASO 1: Construir imagen Docker ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/prislab-v5:latest'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}'
      - '.'
    id: 'build-image'

  # ── PASO 2: Push imagen (paralelo) ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/prislab-v5:latest']
    id: 'push-image-latest'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}']
    id: 'push-image-build'
    waitFor: ['build-image']

  # ── PASO 3: Deploy SOLO prislab-saas ────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prislab-saas'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/prislab-v5:${BUILD_ID}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--add-cloudsql-instances'
      - 'prislab-v5-ai:us-central1:prislab-db'
      - '--set-env-vars'
      - >-
        DEBUG=False,
        GOOGLE_CLOUD_PROJECT=prislab-v5-ai,
        CLOUD_SQL_CONNECTION_NAME=prislab-v5-ai:us-central1:prislab-db,
        DB_NAME=prislab_v5,
        DB_USER=prislab_user,
        GS_BUCKET_NAME=prislab-v5-media,
        GUNICORN_WORKERS=2,
        GUNICORN_THREADS=4,
        GITHUB_REPO=primerosaludlaboratorio-star/PRISLAB_SaaS
      - '--update-secrets'
      - >-
        SECRET_KEY=django-secret-key:latest,
        DB_PASSWORD=db-password:latest,
        GEMINI_API_KEY=gemini-api-key:latest,
        GOOGLE_API_KEY=gemini-api-key:latest,
        DRIVE_FOLDER_ID=drive-folder-id:latest,
        VAPID_PRIVATE_KEY=vapid-private-key:latest,
        VAPID_PUBLIC_KEY=vapid-public-key:latest,
        GITHUB_TOKEN=github-token:latest,
        FERNET_KEY=fernet-key:latest,
        TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,
        TELEGRAM_CISO_CHAT_ID=telegram-ciso-chat-id:latest,
        OMNI_BYPASS_TOKEN=omni-bypass-token:latest,
        PRISLAB_INIT_ADMIN_PASSWORD=e2e-pass:latest
    id: 'deploy-prislab-saas'
    waitFor: ['push-image-latest', 'push-image-build']

  # ── PASO 4: Smoke-test rápido de Farmacia ───────────────────────────────────
  - name: 'node:20-slim'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        npm install -g node-fetch@2 2>/dev/null || true

        SERVICE_URL=$(gcloud run services describe prislab-saas \
          --region us-central1 --format 'value(status.url)' 2>/dev/null || echo "")

        if [ -z "$$SERVICE_URL" ]; then
          echo "WARN: No se pudo obtener URL del servicio, saltando smoke-test"
          exit 0
        fi

        echo "Smoke-test Farmacia en: $$SERVICE_URL"

        # Verificar que las rutas principales devuelven algo (302 = redirige a login = OK)
        for path in "/farmacia/" "/farmacia/pdv/" "/farmacia/inventario/" "/farmacia/erp/kardex/"; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$$SERVICE_URL$$path" || echo "ERR")
          if [ "$$STATUS" = "000" ] || [ "$$STATUS" = "ERR" ]; then
            echo "FAIL $$path → $$STATUS"
            exit 1
          fi
          echo "  OK [$$STATUS] $$path"
        done
        echo "Smoke-test Farmacia: PASSED"
    id: 'smoke-test-farmacia'
    waitFor: ['deploy-prislab-saas']
    secretEnv:
      - 'E2E_USER'
      - 'E2E_PASS'

availableSecrets:
  secretManager:
    - versionName: 'projects/${PROJECT_ID}/secrets/e2e-user/versions/latest'
      env: 'E2E_USER'
    - versionName: 'projects/${PROJECT_ID}/secrets/e2e-pass/versions/latest'
      env: 'E2E_PASS'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

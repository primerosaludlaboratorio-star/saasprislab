# Docker Compose override — upstream reaches the 'app' container by service name.
# Mount this file instead of prislab.conf when running via docker-compose.
# Generated by audit fix script.

upstream prislab_app {
    server app:8000;
}

# ── HTTP → redirigir a HTTPS ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name prislab.labcorecloud.com labcorecloud.com www.labcorecloud.com;

    # ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Servidor principal ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prislab.labcorecloud.com labcorecloud.com www.labcorecloud.com;

    # Certificados Let's Encrypt (generados por Certbot)
    ssl_certificate     /etc/letsencrypt/live/labcorecloud-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/labcorecloud-wildcard/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500m;

    # ── Headers de seguridad ──────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss:; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Archivos estáticos (servidos directamente por Nginx) ─────────────
    location /static/ {
        alias /var/www/prislab-static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Archivos media ────────────────────────────────────────────────────
    location /media/ {
        alias /opt/prislab/app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Favicon ───────────────────────────────────────────────────────────
    location /favicon.ico {
        alias /var/www/prislab-static/img/favicon.ico;
        access_log off;
        expires 365d;
    }

    # ── Aplicación Django (proxy a Gunicorn) ─────────────────────────────
    location / {
        proxy_pass http://prislab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ── Bloquear acceso a archivos sensibles ─────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
    }

    location ~ \.(env|py|sh|sqlite3)$ {
        deny all;
    }
}

# ==============================================================================
# Proxy params compartidos — incluidos en cada location que pasa a Gunicorn
# ==============================================================================

proxy_set_header Host $http_host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $server_name;

# WebSocket support (para futuras implementaciones de Telemedicina)
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# Buffering (optimizado para respuestas Django)
proxy_buffering on;
proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;

# Timeouts generosos (las consultas IA pueden tardar)
proxy_connect_timeout 60s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;

# No pasar el request body dos veces
proxy_request_buffering on;

# Redirect correctamente detrás de proxy
proxy_redirect off;

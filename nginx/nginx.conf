# ==============================================================================
# PRISLAB V5 — Nginx Configuration (Producción)
# ==============================================================================
# Reverse Proxy → Gunicorn
# SSL/TLS con Let's Encrypt
# Soporte para archivos pesados (Videos USG, Tomografías, etc.)
# Protección DDoS básica + Headers de seguridad
# ==============================================================================

user  nginx;
worker_processes  auto;                  # Un worker por CPU core
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;            # Conexiones simultáneas por worker
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Formato de logs ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Optimización de rendimiento ──────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Compresión Gzip ──────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Límites para archivos pesados (Videos USG, Tomografías) ──────────
    client_max_body_size          500M;    # Permitir subir archivos de hasta 500 MB
    client_body_buffer_size       10M;     # Buffer en memoria antes de escribir a disco
    client_body_timeout           300s;    # Timeout de 5 min para subidas lentas
    proxy_read_timeout            300s;    # Esperar hasta 5 min la respuesta de Django
    proxy_connect_timeout         60s;
    proxy_send_timeout            300s;

    # ── Seguridad: Limitar tasa de peticiones (anti-brute-force) ─────────
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    # ── Cache de archivos estáticos en Nginx ─────────────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=1g
                     inactive=60m use_temp_path=off;

    # ── Upstream: Pool de Gunicorn ───────────────────────────────────────
    upstream prislab_app {
        server app:8000 fail_timeout=0;
    }

    # ── Incluir configuraciones de sitios ────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}

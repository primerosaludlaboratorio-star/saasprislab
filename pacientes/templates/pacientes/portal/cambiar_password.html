{% extends 'pacientes/portal/dashboard.html' %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">Cambiar Contraseña</h2>
    
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Contraseña Actual *</label>
                            <input type="password" name="password_actual" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nueva Contraseña *</label>
                            <input type="password" name="password_nueva" class="form-control" required minlength="8">
                            <small class="form-text text-muted">Mínimo 8 caracteres</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmar Nueva Contraseña *</label>
                            <input type="password" name="password_confirmacion" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Cambiar Contraseña
                        </button>
                        <a href="{% url 'pacientes:portal_mi_perfil' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

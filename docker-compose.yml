# ==============================================================================
# PRISLAB V5 — Docker Compose (Producción Ubuntu/Linux)
# ==============================================================================
# Servicios:
#   1. app       → Django + Gunicorn (backend)
#   2. db        → PostgreSQL 16 (base de datos)
#   3. redis     → Redis 7 (caché, IA, tareas async)
#   4. nginx     → Nginx (reverse proxy, SSL, static/media)
#   5. certbot   → Let's Encrypt (renovación automática de certificados)
# ==============================================================================
#
# USO RÁPIDO:
#   chmod +x deploy.sh && ./deploy.sh
#
# USO MANUAL:
#   docker compose up -d --build
#
# ==============================================================================

services:

  # ── 1. BASE DE DATOS — PostgreSQL 16 ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: prislab_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-prislab_v5}
      POSTGRES_USER: ${DB_USER:-prislab_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Debes definir DB_PASSWORD en .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_MX.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # Solo acceso local (seguridad)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-prislab_user} -d ${DB_NAME:-prislab_v5}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - prislab_net

  # ── 2. REDIS — Caché, IA y Tareas Async ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: prislab_redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:?Debes definir REDIS_PASSWORD en .env}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"   # Solo acceso local
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Debes definir REDIS_PASSWORD en .env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prislab_net

  # ── 3. APP — Django + Gunicorn ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prislab_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Django
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?Debes definir SECRET_KEY en .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://prislab.example.com}

      # PostgreSQL
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-prislab_v5}
      DB_USER: ${DB_USER:-prislab_user}
      DB_PASSWORD: ${DB_PASSWORD:?Debes definir DB_PASSWORD en .env}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:?Debes definir REDIS_PASSWORD en .env}@redis:6379/0
      CACHE_BACKEND: django_redis.cache.RedisCache
      CACHE_LOCATION: redis://:${REDIS_PASSWORD:?Debes definir REDIS_PASSWORD en .env}@redis:6379/1

      # IA (Gemini como canónico, DeepSeek como alternativo)
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/v1/chat/completions}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # Gunicorn
      PORT: "8000"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}

      # CFDI / Facturación
      FACTURAMA_USER: ${FACTURAMA_USER:-}
      FACTURAMA_PASSWORD: ${FACTURAMA_PASSWORD:-}
      FACTURAMA_SANDBOX: ${FACTURAMA_SANDBOX:-True}

      # Lab
      LAB_VALIDATION_PIN: ${LAB_VALIDATION_PIN:?Debes definir LAB_VALIDATION_PIN en .env}
    volumes:
      # ── VOLÚMENES PERSISTENTES (CRÍTICO) ──
      - media_data:/app/media          # Firmas, PDFs, radiografías, USG
      - static_data:/app/staticfiles   # CSS/JS recolectados
      - logs_data:/app/logs            # Logs de aplicación
    expose:
      - "8000"
    networks:
      - prislab_net

  # ── 4. NGINX — Reverse Proxy + SSL + Static/Media ────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: prislab_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Configuración de Nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

      # Archivos estáticos y media (mismos volúmenes que la app)
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro

      # Certificados SSL (Let's Encrypt)
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

      # Logs de Nginx
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prislab_net

  # ── 5. CERTBOT — Renovación Automática SSL ───────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: prislab_certbot
    depends_on:
      - nginx
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renovar cada 12 horas (Let's Encrypt recomienda 2 veces al día)
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"


# ── VOLÚMENES PERSISTENTES ─────────────────────────────────────────────────
# NUNCA se pierden datos aunque se reconstruyan los contenedores
volumes:
  postgres_data:
    driver: local
    name: prislab_postgres_data
  redis_data:
    driver: local
    name: prislab_redis_data
  media_data:
    driver: local
    name: prislab_media_data        # Firmas digitales, RX, Videos USG, PDFs
  static_data:
    driver: local
    name: prislab_static_data
  logs_data:
    driver: local
    name: prislab_logs_data
  certbot_conf:
    driver: local
    name: prislab_certbot_conf
  certbot_www:
    driver: local
    name: prislab_certbot_www
  nginx_logs:
    driver: local
    name: prislab_nginx_logs


# ── RED INTERNA ─────────────────────────────────────────────────────────────
networks:
  prislab_net:
    driver: bridge
    name: prislab_network

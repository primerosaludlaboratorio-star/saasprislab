{% extends "base.html" %}
{% load static %}

{% block title %}Enfermería - Dashboard{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <h2><i class="fas fa-user-nurse"></i> Dashboard de Enfermería</h2>
    <p class="text-muted">Captura de signos vitales y triage</p>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h3 class="text-warning">{{ pacientes_pendientes }}</h3>
                    <p class="mb-0">Pacientes Pendientes</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <a href="{% url 'enfermeria:lista_pacientes_triage' %}" class="card text-center shadow-sm text-decoration-none">
                <div class="card-body">
                    <i class="fas fa-clipboard-list fa-3x text-primary mb-3"></i>
                    <h5>Lista de Triage</h5>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="{% url 'enfermeria:alertas_signos_criticos' %}" class="card text-center shadow-sm text-decoration-none">
                <div class="card-body">
                    <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                    <h5>Alertas Críticas</h5>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}

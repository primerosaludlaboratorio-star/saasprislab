{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-cash-register"></i> Apertura de Caja</h4>
                </div>
                <div class="card-body p-4">
                    <div id="alert-box" class="d-none"></div>
                    <form id="form-apertura">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label h5">Fondo Inicial (Efectivo)</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" id="fondo_efectivo" name="fondo_efectivo"
                                       class="form-control" placeholder="0.00" required min="0.01">
                            </div>
                            <small class="text-muted">Ingresa el dinero físico con el que inicia el turno.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Vales / Fondos adicionales (opcional)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" id="fondo_vales" name="fondo_vales"
                                       class="form-control" placeholder="0.00" min="0">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Observaciones (opcional)</label>
                            <textarea id="observaciones" name="observaciones" class="form-control" rows="2" placeholder="Ej: Billete de $500 marcado..."></textarea>
                        </div>
                        <button type="submit" id="btn-submit" class="btn btn-success btn-lg w-100">
                            <i class="fas fa-play-circle me-2"></i> INICIAR TURNO
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('form-apertura').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Abriendo turno...';

    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    const payload = {
        fondo_efectivo: parseFloat(document.getElementById('fondo_efectivo').value) || 0,
        fondo_vales: parseFloat(document.getElementById('fondo_vales').value) || 0,
        observaciones: document.getElementById('observaciones').value
    };

    fetch("{% url 'farmacia:abrir_caja' %}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
        },
        body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            const alertBox = document.getElementById('alert-box');
            alertBox.className = 'alert alert-success';
            alertBox.innerHTML = '<i class="fas fa-check-circle me-2"></i><strong>¡Turno iniciado!</strong> Folio: ' + (data.apertura ? data.apertura.folio : '') + '. Redirigiendo...';
            alertBox.classList.remove('d-none');
            setTimeout(() => { window.location.href = "{% url 'pdv_farmacia' %}"; }, 1500);
        } else {
            const alertBox = document.getElementById('alert-box');
            alertBox.className = 'alert alert-danger';
            alertBox.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i>' + (data.error || 'Error desconocido');
            alertBox.classList.remove('d-none');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play-circle me-2"></i> INICIAR TURNO';
        }
    })
    .catch(err => {
        console.error(err);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-play-circle me-2"></i> INICIAR TURNO';
    });
});
</script>
{% endblock %}

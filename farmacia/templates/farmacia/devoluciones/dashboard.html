{% extends 'base.html' %}
{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-undo-alt text-warning"></i> Devoluciones</h2>
    </div>
    
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" action="{% url 'farmacia:buscar_venta_devolucion' %}" class="row g-3">
                <div class="col-md-8">
                    <input type="text" name="folio" class="form-control form-control-lg" placeholder="Escanear o escribir Folio de Venta (Ej: V-2026-001)">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary btn-lg w-100">Buscar Venta</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
